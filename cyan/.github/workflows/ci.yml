name: Validate Cyan

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install pinned Roblox tools
        uses: paradoxum-games/setup-rokit@v1
        with:
          version: v1.2.0
          cache: true

      - name: Install pinned project tools
        run: rokit install --no-trust-check

      - name: Verify formatting and Luau syntax
        run: stylua --check Library.lua Library.d.luau Example.lua init.luau addons tests/keysystem_smoke.luau

      - name: Validate project invariants
        run: python3 tests/validate_project.py

      - name: Smoke-test persistence add-ons
        run: bash tests/smoke_addons.sh

      - name: Smoke-test key system
        run: luau tests/keysystem_smoke.luau

      - name: Validate Wally package
        run: wally package --output /tmp/cyan.wally
